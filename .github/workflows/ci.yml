name: ci

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test core + frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-
      - name: cargo test (core)
        run: cargo test -p mmdeep-core --locked
      - name: frontend build
        run: |
          npm ci
          npm run build

  bench:
    name: benchmark engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build mmdeep-core (release)
        run: cargo build --release -p mmdeep-core --locked
      - name: run benchmark (quick — skips 1M)
        run: python scripts/bench.py --quick --iterations 30
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results.json

  build:
    name: installer (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-
      - name: install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev
      - name: install frontend deps
        run: npm ci
      - name: build app + installers
        run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: mmdeep-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: ignore

  tag:
    name: auto-tag (feat commits)
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: detect feat commit & create tag
        env:
          TAG_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          MSG=$(git log -1 --format='%s')
          if [[ ! $MSG =~ ^feat: ]]; then
            echo "Not a feat commit, skipping."
            exit 0
          fi

          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [[ -z "$LATEST" ]]; then
            NEW_TAG="v0.1.0"
          else
            IFS='.' read -r -a VER <<< "${LATEST#v}"
            MAJOR="${VER[0]}"
            MINOR="${VER[1]}"
            NEW_TAG="v${MAJOR}.$((MINOR+1)).0"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"

          git remote set-url origin "https://x-access-token:${TAG_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "$NEW_TAG"

          echo "Created and pushed tag: $NEW_TAG"
